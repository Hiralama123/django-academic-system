{% extends 'base.html' %}

{% block title %}Registration Form — Django Lab{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <div class="sec-marker">
            <span class="sec-num">Registrations</span>
            <span class="sec-line"></span>
        </div>
        <h1>{% if form.instance.pk %}Edit <span>Registration</span>{% else %}Add <span>Registration</span>{% endif %}</h1>
    </div>

    <div class="form-card">
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Registration</button>
                <a href="{% url 'registration_list' %}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
